<!DOCTYPE html>
<html data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Map</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="theme-color" content="#212529">
  <script src="plotly.min.js"></script>
  <style>
    :root {
      --gm-bg:              #ffffff;
      --gm-surface:         #f8f9fa;
      --gm-text:            #212529;
      --gm-border:          #ced4da;
      --gm-btn-bg:          #e9ecef;
      --gm-btn-text:        #212529;
      --gm-input-bg:        #ffffff;
      --gm-active-btn-bg:      rgba(0,0,0,0.8);
      --gm-active-btn-text:    #ffffff;
      --gm-secondary-btn-bg:   rgba(0,0,0,0.25);
      --gm-secondary-btn-text: #212529;
    }
    [data-theme="dark"] {
      --gm-bg:                 #1e1e2e;
      --gm-surface:            #2a2a3e;
      --gm-text:               #cdd6f4;
      --gm-border:             #585b70;
      --gm-btn-bg:             #313244;
      --gm-btn-text:           #cdd6f4;
      --gm-input-bg:           #2a2a3e;
      --gm-active-btn-bg:      rgba(205,214,244,0.9);
      --gm-active-btn-text:    #1e1e2e;
      --gm-secondary-btn-bg:   rgba(205,214,244,0.3);
      --gm-secondary-btn-text: #cdd6f4;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background-color: var(--gm-bg);
      color: var(--gm-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      overflow-x: hidden;
    }

    select, input[type="text"] {
      background-color: var(--gm-input-bg);
      color: var(--gm-text);
      border: 1px solid var(--gm-border);
      padding: 2px 6px;
      height: 30px;
      border-radius: 3px;
      font-size: 13px;
    }

    button {
      background-color: var(--gm-btn-bg);
      color: var(--gm-btn-text);
      border: 1px solid var(--gm-border);
      cursor: pointer;
      border-radius: 3px;
      font-size: 14px;
    }
    button:hover { filter: brightness(0.93); }

    /* ── Controls panel ── */
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      padding: 10px;
      align-items: flex-start;
      position: relative;
    }

    #right-panel {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #scale-mode-row {
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }

    #scale-controls {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #relative-keys {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #skip-pattern {
      font-family: monospace;
      font-size: 16px;
      opacity: 0.7;
      white-space: nowrap;
      margin-left: 10px;
    }

    .rel-key-row {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 30px;
    }

    .rel-key-label {
      white-space: nowrap;
      width: 110px;
    }

    .rel-key-value {
      font-weight: bold;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 30px;
    }
    .control-row label {
      width: 110px;
      white-space: nowrap;
    }

    .string-input { width: 100px; }

    /* ── Chord buttons + transitions ── */
    #chord-area {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    #chord-buttons {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .trans-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .trans-section-label {
      height: 30px;
      display: flex;
      align-items: center;
      font-size: 12px;
      opacity: 0.7;
      white-space: nowrap;
    }

    .trans-label {
      width: 160px;
      text-align: right;
      font-size: 13px;
      flex-shrink: 0;
      padding-right: 8px;
      opacity: 0.7;
    }

    .borrowed-mode-label {
      min-width: 140px;
      text-align: right;
      font-size: 13px;
      flex-shrink: 0;
      padding-right: 8px;
      opacity: 0.7;
      white-space: nowrap;
    }

    .trans-btn {
      min-width: 120px;
      height: 30px;
      font-size: 13px;
      padding: 0 4px;
      white-space: nowrap;
      background-color: var(--gm-btn-bg);
      color: var(--gm-btn-text);
      border: 1px solid var(--gm-border);
      cursor: pointer;
      border-radius: 3px;
    }
    .trans-btn:hover { filter: brightness(0.93); }
    .trans-btn.secondary {
      background-color: var(--gm-secondary-btn-bg);
      color: var(--gm-secondary-btn-text);
      border-color: transparent;
      opacity: 0.55;
    }
    .trans-btn.active {
      background-color: var(--gm-active-btn-bg);
      color: var(--gm-active-btn-text);
      border-color: transparent;
    }

    .chord-row {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 30px;
    }

    .chord-row-label {
      width: 110px;       /* matches .control-row label so buttons align with dropdowns */
      text-align: right;
      font-size: 13px;
      flex-shrink: 0;
      padding-right: 8px;
    }

    .chord-btn {
      width: 120px;
      height: 30px;
      font-size: 13px;
      padding: 0 4px;
      white-space: nowrap;
    }
    .chord-btn.active {
      background-color: var(--gm-active-btn-bg);
      color: var(--gm-active-btn-text);
      border-color: transparent;
    }
    .chord-btn.secondary {
      background-color: var(--gm-secondary-btn-bg);
      color: var(--gm-secondary-btn-text);
      border-color: transparent;
    }

    /* ── Settings gear button ── */
    #settings-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 30px;
      height: 30px;
      font-size: 18px;
      padding: 0;
      line-height: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Circle of Fifths ── */
    #cof-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-left: auto;
      flex-shrink: 0;
    }
    .cof-title {
      font-size: 11px;
      opacity: 0.6;
      margin-bottom: 2px;
    }
    #circle-of-fifths {
      position: relative;
    }

    /* ── Fretboard ── */
    #fretboard {
      width: 100%;
    }

    /* ── Chord diagrams ── */
    #chord-diagrams {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px;
    }

    .chord-position-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
    }

    .chord-diagram-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      border-radius: 3px;
    }

    .chord-diagram-wrap.selected {
      box-shadow: 0 0 0 2px var(--gm-text);
      border-radius: 3px;
    }

    /* ── Chord notes ── */
    #chord-notes {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 0;
      align-items: center;
      justify-content: center;
      min-height: 30px;
    }

    /* ── Preferences modal ── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.hidden { display: none; }

    .modal-content {
      background: var(--gm-surface);
      border: 1px solid var(--gm-border);
      border-radius: 6px;
      padding: 20px 24px;
      min-width: 300px;
    }
    .modal-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 16px;
    }
    .modal-body {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
    }
    .modal-footer button {
      padding: 4px 18px;
    }
  </style>
</head>
<body>

<div id="controls">
  <div id="right-panel">
    <div id="scale-mode-row">
      <div id="scale-controls">
        <div class="control-row">
          <label>Tonic</label>
          <select id="tonic" style="width:120px"></select>
        </div>
        <div class="control-row">
          <label>Scale</label>
          <select id="scale" style="width:300px"></select>
        </div>
        <div class="control-row">
          <label>Mode</label>
          <select id="mode" style="width:300px"></select>
          <span id="skip-pattern"></span>
        </div>
      </div>
    </div>
    <div style="height:8px"></div>
    <div id="chord-area">
      <div id="chord-buttons"></div>
      <div class="trans-section" id="relative-keys">
        <div class="trans-section-label">Relative keys:</div>
        <div class="rel-key-row">
          <span class="rel-key-label">Relative major</span>
          <span id="rel-major-value" class="rel-key-value"></span>
        </div>
        <div class="rel-key-row">
          <span class="rel-key-label">Relative minor</span>
          <span id="rel-minor-value" class="rel-key-value"></span>
        </div>
      </div>
      <div class="trans-section" id="tonic-alterations">
        <div class="trans-section-label">Tonic alterations:</div>
        <div class="chord-row">
          <span class="trans-label">Neapolitan (♭II)</span>
          <button class="trans-btn" id="tonic-alt-b2"></button>
        </div>
        <div class="chord-row">
          <span class="trans-label">♭III</span>
          <button class="trans-btn" id="tonic-alt-b3"></button>
        </div>
        <div class="chord-row">
          <span class="trans-label">Minor subdominant (iv)</span>
          <button class="trans-btn" id="tonic-alt-iv"></button>
        </div>
        <div class="chord-row">
          <span class="trans-label">♭VI</span>
          <button class="trans-btn" id="tonic-alt-b6"></button>
        </div>
        <div class="chord-row">
          <span class="trans-label">Subtonic (♭VII)</span>
          <button class="trans-btn" id="tonic-alt-b7"></button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <div id="chord-notes"></div>
        <div class="trans-section" id="chord-transitions" style="visibility:hidden">
        <div class="trans-section-label">Common out-of-key chord transitions:</div>
        <div class="chord-row">
          <span class="trans-label">Secondary dominant</span>
          <button class="trans-btn" id="trans-sec-dom"></button>
        </div>
        <div class="chord-row">
          <span class="trans-label">Chromatic mediant (m3)</span>
          <button class="trans-btn" id="trans-med-up-m3"></button>
          <button class="trans-btn" id="trans-med-dn-m3"></button>
        </div>
        <div class="chord-row">
          <span class="trans-label">Chromatic mediant (M3)</span>
          <button class="trans-btn" id="trans-med-up-M3"></button>
          <button class="trans-btn" id="trans-med-dn-M3"></button>
        </div>
        </div>
      </div>
      <div class="trans-section" id="borrowed-chords" style="visibility:hidden">
        <div class="trans-section-label">Borrowed chords:</div>
        <div id="borrowed-chord-rows"></div>
      </div>
    </div>
  </div>
  <div id="cof-container">
    <div id="circle-of-fifths"></div>
  </div>
  <button id="settings-btn" title="Settings">⚙</button>
</div>

<div id="fretboard"></div>
<div id="chord-diagrams"></div>

<!-- Preferences modal -->
<div id="preferences-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-title">Preferences</div>
    <div class="modal-body">
      <label for="theme-select">Theme</label>
      <select id="theme-select" style="width:140px"></select>
    </div>
    <div class="modal-body">
      <label for="num-strings">Strings</label>
      <select id="num-strings" style="width:100px"></select>
    </div>
    <div id="string-inputs" style="margin-bottom:16px"></div>
    <div class="modal-footer">
      <button id="close-preferences-btn">Close</button>
    </div>
  </div>
</div>

<!-- Hidden file input for open (web path; Electron uses native dialog) -->
<input type="file" id="file-input" accept=".json" style="display:none">

<!-- Hidden button for Electron Preferences menu item -->
<button id="open-preferences-btn" style="display:none"></button>

<script src="guitar_map.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
